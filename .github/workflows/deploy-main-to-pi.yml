name: Deploy Main To Raspberry Pi

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.PI_HOST }}
          username: ${{ secrets.PI_USER }}
          key: ${{ secrets.PI_SSH_KEY }}
          script_stop: true
          script: |
            bash "${{ secrets.PI_APP_DIR }}/tools/deploy_on_pi.sh" "${{ secrets.PI_APP_DIR }}" "main" "${{ secrets.PI_SERVICE_NAME }}"
